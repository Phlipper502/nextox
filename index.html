<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextox.ch – Wartungsmodus</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 90%;
        }

        .hero-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #1a202c;
        }

        .status {
            display: inline-block;
            background: #e2e8f0;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.8rem;
            color: #4a5568;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #718096;
            margin-bottom: 30px;
        }

        .shoutout {
            background: #3182ce;
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(49, 130, 206, 0.3);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1000" alt="Tech" class="hero-image">
        
        <div class="status">🛠 WARTUNGSARBEITEN</div>
        
        <h1>Nextox.ch</h1>
        
        <p>Wir schrauben gerade an der Zukunft der Datensicherheit. Die Seite ist aktuell nicht erreichbar, aber wir sind bald mit voller Power zurück.</p>

        <div class="shoutout">
            🚀 SHOUT OUT AN ROBIN KERTZ!
        </div>

        <div class="footer">
            &copy; 2026 NextOX Switzerland. Alle Systeme werden verschlüsselt.
        </div>
    </div>

</body>
</html>
