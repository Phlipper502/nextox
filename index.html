<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextox | Rebrand</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff; /* Clean weiß */
            color: #1a202c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 2rem;
        }

        .logo {
            max-width: 250px; /* Größe deines Logos */
            height: auto;
            margin-bottom: 2.5rem;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            width: 60px;
            margin: 2rem auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #4a5568;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .slogan {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 3rem;
        }

        .legacy-box {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #edf2f7;
        }

        .legacy-text {
            font-size: 0.85rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .legacy-brand {
            font-weight: 700;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Nextox Logo" class="logo">

        <div class="divider"></div>

        <h1>PROJEKT NEXTOX</h1>
        <p class="slogan">Innovation aus Tradition. Ihre Daten in sicheren Händen.</p>

        <div class="legacy-box">
            <p class="legacy-text">Strategischer Rebrand der <span class="legacy-brand">Phlipper AG</span></p>
        </div>
    </div>

</body>
</html>
