<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextox | Cybersecurity Evolution | Rebranded from Phlipper AG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --accent-primary: #00d4ff;
            --accent-secondary: #3b82f6;
            --accent-glow: #06b6d4;
            --text-primary: #f8fafc;
            --text-secondary: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: rgba(59, 130, 246, 0.15);
            --glass-bg: rgba(17, 24, 39, 0.85);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Cybersecurity Matrix Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
            z-index: 1;
            animation: matrixFlow 20s linear infinite;
        }

        /* Subtile Matrix-Code-Regen */
        body::after {
            content: '101010 01100110 01001111 01110010 01100111 01100101 00110000 00110001 01100011 01111001 01100010 01100101 01110010 00110011 01100101 01100011 01110101 01110010 01101001 01110100 01111001';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: rgba(0, 212, 255, 0.1);
            white-space: nowrap;
            overflow: hidden;
            animation: codeRain 25s linear infinite;
            z-index: 2;
        }

        @keyframes matrixFlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        @keyframes codeRain {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .container {
            text-align: center;
            padding: 4rem 3rem;
            border-radius: 24px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(32px) saturate(180%);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(59, 130, 246, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 10;
            max-width: 700px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.4; transform: translateX(-100%); }
            50% { opacity: 1; transform: translateX(100%); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-primary);
            margin-bottom: 2rem;
            background: rgba(0, 212, 255, 0.1);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .shield-icon {
            width: 16px;
            height: 16px;
            background: conic-gradient(from 0deg at 50% 10%, #00d4ff 0deg 90deg, #3b82f6 90deg 180deg, #10b981 180deg 270deg, #f59e0b 270deg 360deg);
            border-radius: 3px;
            clip-path: polygon(50% 0%, 0% 20%, 0% 100%, 50% 85%, 100% 100%, 100% 20%);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.5);
            animation: shieldPulse 2s ease-in-out infinite;
        }

        @keyframes shieldPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(0, 212, 255, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(0, 212, 255, 0.8); }
        }

        h1 {
            font-size: clamp(3.5rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-primary) 50%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            border-radius: 2px;
        }

        .slogan {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            letter-spacing: 0.5px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .evolution-timeline {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            margin: 4rem 0;
            flex-wrap: wrap;
        }

        .timeline-item {
            position: relative;
            padding: 1.5rem 0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--accent-primary));
        }

        .legacy-badge, .new-badge {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 2rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 180px;
        }

        .legacy-badge:hover, .new-badge:hover {
            transform: translateY(-8px);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.15);
        }

        .legacy-badge .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .new-badge .label {
            font-size: 0.85rem;
            color: var(--accent-primary);
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .legacy-badge .name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: -0.5px;
        }

        .new-badge .name {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 16px currentColor;
            animation: statusPulse 2s infinite;
        }

        .legacy-badge .status-indicator {
            background: #6b7280;
            color: #6b7280;
        }

        .new-badge .status-indicator {
            background: var(--accent-primary);
            color: var(--accent-primary);
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.15); }
        }

        .footer-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            padding-top: 2.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 3rem;
        }

        .highlight {
            color: var(--accent-primary);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 3rem 2rem;
                margin: 1rem;
            }
            
            .evolution-timeline {
                flex-direction: column;
                gap: 2rem;
            }
            
            .timeline-item::before {
                display: none;
            }
        }

        /* Loading Animation */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="badge">
            <div class="shield-icon"></div>
            Cybersecurity Rebranding
        </div>

        <h1>Nextox</h1>
        
        <div class="slogan">
            Advanced Threat Intelligence • Zero Trust Architecture • Next-Gen Protection
        </div>

        <div class="evolution-timeline">
            <div class="timeline-item">
                <div class="legacy-badge">
                    <div class="status-indicator"></div>
                    <div class="label">Legacy</div>
                    <div class="name">Phlipper AG</div>
                </div>
            </div>
            
            <div class="timeline-item">
                <div class="new-badge">
                    <div class="status-indicator"></div>
                    <div class="label">Now</div>
                    <div class="name">Nextox</div>
                </div>
            </div>
        </div>

        <div class="footer-text">
            🔒 <span class="highlight">Phlipper AG</span> evolves into <span class="highlight">Nextox</span> – 
            Pioneering the future of enterprise cybersecurity
        </div>
    </div>

    <script>
        // Subtile Partikel-Animation für Cyber-Atmosphäre
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.getElementById('particles').appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 7000);
        }

        // Partikel alle 300ms erstellen
        setInterval(createParticle, 300);

        // Initiale Partikel
        for (let i = 0; i < 5; i++) {
            setTimeout(createParticle, i * 200);
        }
    </script>
</body>
</html>
