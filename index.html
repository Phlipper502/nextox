<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextOX | Secure Data Solutions</title>
    <style>
        :root {
            --primary: #38bdf8; /* Das helle Blau aus deinem Logo */
            --secondary: #818cf8; /* Der Violett-Ton */
            --bg: #020617;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Hintergrund-Effekt für Tiefe */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            top: -50%;
            z-index: -1;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem;
            border-radius: 2rem;
            box-shadow: 0 0 80px rgba(56, 189, 248, 0.15);
            text-align: center;
            max-width: 500px;
        }

        /* Das animierte X - Dein Markenzeichen */
        .logo-x {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.5));
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -0.05rem;
            margin: 0;
            color: #fff;
        }

        .tagline {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            font-size: 0.8rem;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--primary);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="container">
        <div class="logo-x">X</div>
        <h1>NextOX</h1>
        <div class="tagline">Data Encryption & Safety</div>
        
        <p>
            Wir definieren Sicherheit neu. <br>
            NextOX bereitet den Launch für den Schweizer Markt vor. 
        </p>

        <div class="status-badge">
            <div class="status-dot"></div>
            SYSTEMS ENCRYPTING...
        </div>
    </div>
</body>
</html>
