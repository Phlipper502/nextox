<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextox | Rebranded from Phlipper AG</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #020617;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Subtiler Scanline-Effekt für den Tech-Look */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            z-index: 2;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 4rem;
            border-radius: 32px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5);
            z-index: 10;
            max-width: 650px;
        }

        .rebrand-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.4rem;
            color: #38bdf8;
            margin-bottom: 1.5rem;
            font-weight: 800;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff 40%, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slogan {
            font-size: 1.4rem;
            color: #f1f5f9;
            font-weight: 300;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
        }

        .origin-info {
            font-size: 0.9rem;
            color: #64748b;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .origin-info strong {
            color: #94a3b8;
            letter-spacing: 1px;
        }

        .glow-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #38bdf8;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 15px #38bdf8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rebrand-label">Corporate Rebrand</div>
        <h1>Nextox</h1>
        <div class="slogan">Security. Evolution. Power.</div>
        
        <div class="origin-info">
            <span class="glow-dot"></span>
            Legacy Excellence: <strong>PHLIPPER AG</strong> is now <strong>NEXTOX</strong>
        </div>
    </div>

</body>
</html>
